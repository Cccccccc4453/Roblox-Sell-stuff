<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BloxMarket | Roblox Gamepasses Control</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Reset and Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #191b1f;
            color: #ffffff;
            overflow-x: hidden;
            padding-bottom: 60px;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* Navigation Bar */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            background-color: #2e3137;
            border-bottom: 2px solid #3a3f47;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .logo span {
            color: #00a2ff;
        }

        .nav-buttons {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        /* Nav Buttons */
        .admin-toggle-btn {
            background: #ffaa00;
            border: none;
            color: #0f111a;
            padding: 10px 18px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        .admin-toggle-btn:hover {
            background: #e09600;
        }

        .cart-icon-btn {
            background: #3a3f47;
            border: 1px solid #00a2ff;
            color: #fff;
            padding: 10px 18px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.2s;
        }

        .cart-icon-btn:hover {
            background: #00a2ff;
            color: #ffffff;
        }

        .cart-count {
            background: #ff3b30;
            color: white;
            padding: 2px 7px;
            border-radius: 50%;
            font-size: 12px;
        }

        /* Main Content / Games Grid */
        main {
            padding: 40px 8%;
        }

        .section-title {
            font-size: 24px;
            margin-bottom: 30px;
            border-left: 4px solid #00a2ff;
            padding-left: 10px;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }

        .game-card {
            background-color: #22252a;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #3a3f47;
            transition: transform 0.3s, border-color 0.3s;
            position: relative;
        }

        .game-card:hover {
            transform: translateY(-5px);
            border-color: #00a2ff;
        }

        .game-thumb {
            width: 100%;
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #ffffff;
            font-size: 22px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.6);
        }

        /* Card Background Colors */
        .game-card:nth-child(3n+1) .game-thumb { background: linear-gradient(135deg, #8e2de2, #4a00e0); }
        .game-card:nth-child(3n+2) .game-thumb { background: linear-gradient(135deg, #f857a6, #ff5858); }
        .game-card:nth-child(3n+3) .game-thumb { background: linear-gradient(135deg, #11998e, #38ef7d); }

        .game-info {
            padding: 20px;
        }

        .game-title {
            font-size: 18px;
            margin-bottom: 5px;
        }

        .game-desc {
            font-size: 13px;
            color: #b1b5be;
            margin-bottom: 15px;
            height: 36px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .game-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .game-price {
            font-size: 18px;
            font-weight: bold;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .robux-icon {
            color: #00a2ff;
            font-weight: 800;
        }

        .buy-btn {
            background-color: #00a2ff;
            color: #ffffff;
            border: none;
            padding: 8px 14px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }

        .buy-btn:hover {
            background-color: #0082cc;
        }

        /* Delete Button for Admin Mode */
        .delete-item-btn {
            display: none; 
            position: absolute;
            top: 10px;
            right: 10px;
            background: #ff3b30;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            font-weight: bold;
            z-index: 10;
        }
        
        body.admin-mode-active .delete-item-btn {
            display: block;
        }

        /* Admin Management Panel styling */
        .admin-panel {
            display: none; 
            background-color: #2e3137;
            border-top: 4px solid #ffaa00;
            padding: 30px 8%;
            margin-top: 40px;
        }

        .admin-panel.active {
            display: block;
        }

        .admin-form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            background: #191b1f;
            padding: 20px;
            border-radius: 6px;
            margin-bottom: 25px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .form-group label {
            font-size: 12px;
            color: #b1b5be;
            font-weight: bold;
        }

        .form-group input {
            background: #22252a;
            border: 1px solid #3a3f47;
            color: white;
            padding: 8px;
            border-radius: 4px;
            outline: none;
        }

        .form-group input:focus {
            border-color: #ffaa00;
        }

        .admin-submit-btn {
            background: #ffaa00;
            color: #191b1f;
            border: none;
            padding: 10px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            align-self: flex-end;
        }

        /* Slide-out Cart Panel */
        .cart-panel {
            position: fixed;
            top: 0;
            right: -420px;
            width: 420px;
            height: 100vh;
            background-color: #22252a;
            border-left: 2px solid #3a3f47;
            box-shadow: -5px 0 15px rgba(0,0,0,0.5);
            z-index: 200;
            display: flex;
            flex-direction: column;
            transition: right 0.3s ease-in-out;
            padding: 30px;
        }

        .cart-panel.open {
            right: 0;
        }

        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid #3a3f47;
            padding-bottom: 15px;
        }

        .close-cart {
            background: none;
            border: none;
            color: #b1b5be;
            font-size: 24px;
            cursor: pointer;
        }

        .cart-items {
            flex-grow: 1;
            overflow-y: auto;
            margin-bottom: 15px;
        }

        .cart-item {
            background: #191b1f;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 10px;
            border: 1px solid #3a3f47;
        }

        .cart-item-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cart-item-info h4 {
            font-size: 14px;
        }

        .cart-item-info span {
            color: #00a2ff;
            font-weight: bold;
        }

        .remove-btn {
            background: none;
            border: none;
            color: #ff3b30;
            cursor: pointer;
            font-size: 12px;
            margin-top: 5px;
        }

        .cart-footer {
            border-top: 1px solid #3a3f47;
            padding-top: 15px;
        }

        .discord-input-box {
            margin-bottom: 15px;
        }

        .discord-input-box label {
            display: block;
            font-size: 12px;
            color: #b1b5be;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .discord-input-box input {
            width: 100%;
            background: #191b1f;
            border: 1px solid #3a3f47;
            color: white;
            padding: 10px;
            border-radius: 4px;
            outline: none;
        }

        .discord-input-box input:focus {
            border-color: #00a2ff;
        }

        .checkout-btn {
            width: 100%;
            background-color: #5865F2; 
            color: #ffffff;
            padding: 14px;
            font-weight: bold;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .checkout-btn:hover {
            background-color: #4752c4;
        }

        .receipt-container {
            background: #191b1f;
            border: 2px dashed #ffaa00;
            padding: 15px;
            border-radius: 6px;
            margin-top: 10px;
        }

        .receipt-title {
            color: #ffaa00;
            font-size: 16px;
            text-align: center;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .receipt-steps {
            font-size: 13px;
            color: #ffffff;
            margin: 10px 0;
            padding-left: 15px;
        }

        .receipt-steps li {
            margin-bottom: 8px;
        }

        .discord-tag-highlight {
            background: #2e3137;
            padding: 2px 6px;
            border-radius: 4px;
            color: #ffaa00;
            font-family: monospace;
            font-weight: bold;
        }

        .empty-msg {
            color: #686d77;
            text-align: center;
            margin-top: 40px;
        }

        footer {
            background-color: #111215;
            text-align: center;
            padding: 30px;
            color: #686d77;
            font-size: 14px;
            border-top: 1px solid #22252a;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Blox<span>Market</span></div>
        <div class="nav-buttons">
            <button class="admin-toggle-btn" onclick="toggleAdminPanel()">🛠️ Admin Panel</button>
            <button class="cart-icon-btn" onclick="toggleCart()">
                🛒 Cart <span class="cart-count" id="cart-count">0</span>
            </button>
        </div>
    </header>

    <div class="cart-panel" id="cart-panel">
        <div class="cart-header">
            <h3>Your Shopping Cart</h3>
            <button class="close-cart" onclick="toggleCart()">&times;</button>
        </div>
        
        <div id="cart-main-content" style="display: flex; flex-direction: column; flex-grow: 1;">
            <div class="cart-items" id="cart-items">
                <p class="empty-msg">Your cart is empty.</p>
            </div>
            
            <div class="cart-footer" id="cart-footer-controls">
                <div class="discord-input-box">
                    <label>Your Discord Username</label>
                    <input type="text" id="buyer-discord" placeholder="e.g., robloxplayer#1234">
                </div>
                <button class="checkout-btn" onclick="processDiscordOrder()">Submit Order Instructions</button>
            </div>
        </div>
    </div>

    <main>
        <h2 class="section-title">Available Game Access & Passes</h2>
        <div class="games-grid" id="products-container">
            <p style="color:#686d77;">Connecting to cloud database...</p>
        </div>
    </main>

    <section class="admin-panel" id="admin-panel">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h2 style="color: #ffaa00;">Admin Inventory Controller</h2>
            <div>
                <label style="font-size: 12px; color: #b1b5be; font-weight: bold; margin-right: 5px;">Change Shop Discord Tag:</label>
                <input type="text" id="admin-discord-tag-setting" value="YourDiscord#0000" onchange="updateShopDiscordTag(this.value)" style="background: #191b1f; border: 1px solid #3a3f47; color: white; padding: 5px; border-radius: 4px;">
            </div>
        </div>
        
        <div class="admin-form">
            <div class="form-group">
                <label>Gamepass Banner Display Name</label>
                <input type="text" id="admin-game-name" placeholder="e.g., Blox City RPG">
            </div>
            <div class="form-group">
                <label>Item / Pass Title</label>
                <input type="text" id="admin-pass-title" placeholder="e.g., VIP Room Access">
            </div>
            <div class="form-group">
                <label>Product Short Description</label>
                <input type="text" id="admin-desc" placeholder="What does this pass unlock?">
            </div>
            <div class="form-group">
                <label>Robux Price (R$)</label>
                <input type="number" id="admin-price" placeholder="250">
            </div>
            <div class="form-group">
                <label>Roblox Gamepass Absolute URL</label>
                <input type="text" id="admin-url" placeholder="https://roblox.com/... ">
            </div>
            <button class="admin-submit-btn" onclick="addNewProductFromAdmin()">Add Item to Catalog</button>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 BloxMarket Store. Live Supabase cloud engine active.</p>
    </footer>

    <script>
        // 🛠️ REPLACE THESE WITH YOUR ACTUAL SUPABASE CREDENTIALS:
        const SUPABASE_URL = "https://wpklpbejejlqrzovdrytb.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_q0-ASS8SJdiyHsmzjXXlAg_S9c7Diw_";

        // Initialize Supabase Client
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const ADMIN_PASSWORD = "admin123";
        let myDiscordTag = localStorage.getItem('shopDiscordTag') || "YourDiscord#0000";
        document.getElementById('admin-discord-tag-setting').value = myDiscordTag;

        let products = [];
        let cart = [];

        // UI Management
        function toggleCart() { 
            resetCartUI();
            document.getElementById('cart-panel').classList.toggle('open'); 
        }
        
        function updateShopDiscordTag(val) {
            myDiscordTag = val;
            localStorage.setItem('shopDiscordTag', val);
        }

        function toggleAdminPanel() { 
            const panel = document.getElementById('admin-panel');
            if (panel.classList.contains('active')) {
                panel.classList.remove('active');
                document.body.classList.remove('admin-mode-active');
                return;
            }
            let userPassword = prompt("Enter the Admin Password:");
            if (userPassword === ADMIN_PASSWORD) {
                panel.classList.add('active');
                document.body.classList.add('admin-mode-active');
                alert("Access Granted!");
            } else if (userPassword !== null) {
                alert("Incorrect password!");
            }
        }

        // FETCH FROM SUPABASE DATABASE
        async function loadProductsFromCloud() {
            try {
                let { data, error } = await _supabase
                    .from('products')
                    .select('*')
                    .order('id', { ascending: true });

                if (error) throw error;
                products = data || [];
                renderStoreCatalog();
            } catch (err) {
                console.error("Error loading products:", err);
                document.getElementById('products-container').innerHTML = `<p style="color:#ff3b30;">Failed to load storefront catalog items from database. Check API credentials.</p>`;
            }
        }

        function renderStoreCatalog() {
            const container = document.getElementById('products-container');
            container.innerHTML = ''; 

            if(products.length === 0) {
                container.innerHTML = '<p style="color:#686d77;">No games uploaded yet. Open the admin panel to add some!</p>';
                return;
            }

            products.forEach((product, index) => {
                const card = document.createElement('div');
                card.classList.add('game-card');
                card.innerHTML = `
                    <button class="delete-item-btn" onclick="deleteProduct(${product.id})">Delete</button>
                    <div class="game-thumb">${product.name}</div>
                    <div class="game-info">
                        <h3 class="game-title">${product.title}</h3>
                        <p class="game-desc">${product.desc}</p>
                        <div class="game-meta">
                            <span class="game-price"><span class="robux-icon">R$</span> ${product.price}</span>
                            <button class="buy-btn" onclick="addToCart(${index})">Add to Cart</button>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // INSERT INTO SUPABASE DATABASE
        async function addNewProductFromAdmin() {
            const name = document.getElementById('admin-game-name').value;
            const title = document.getElementById('admin-pass-title').value;
            const desc = document.getElementById('admin-desc').value;
            const price = parseInt(document.getElementById('admin-price').value);
            const url = document.getElementById('admin-url').value;

            if(!name || !title || !price || !url) {
                alert("Please fill out all fields!");
                return;
            }

            try {
                const { error } = await _supabase
                    .from('products')
                    .insert([{ name, title, desc, price, url }]);

                if (error) throw error;

                // Clear fields
                document.getElementById('admin-game-name').value = '';
                document.getElementById('admin-pass-title').value = '';
                document.getElementById('admin-desc').value = '';
                document.getElementById('admin-price').value = '';
                document.getElementById('admin-url').value = '';
                
                alert("Item added completely to cloud server matrix!");
                loadProductsFromCloud(); // Refresh list
            } catch (err) {
                alert("Error saving item: " + err.message);
            }
        }

        // DELETE FROM SUPABASE DATABASE
        async function deleteProduct(id) {
            if(confirm("Delete this item permanently from the cloud database?")) {
                try {
                    const { error } = await _supabase
                        .from('products')
                        .delete()
                        .eq('id', id);

                    if (error) throw error;
                    alert("Item deleted!");
                    loadProductsFromCloud(); // Refresh list
                } catch (err) {
                    alert("Error deleting item: " + err.message);
                }
            }
        }

        function addToCart(productIndex) {
            const selectedProduct = products[productIndex];
            cart.push(selectedProduct);
            document.getElementById('cart-panel').classList.add('open');
            resetCartUI();
            updateCartUI();
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCartUI();
        }

        function resetCartUI() {
            document.getElementById('cart-main-content').innerHTML = `
                <div class="cart-items" id="cart-items"></div>
                <div class="cart-footer" id="cart-footer-controls">
                    <div class="discord-input-box">
                        <label>Your Discord Username</label>
                        <input type="text" id="buyer-discord" placeholder="e.g., robloxplayer#1234">
                    </div>
                    <button class="checkout-btn" onclick="processDiscordOrder()">Submit Order Instructions</button>
                </div>
            `;
            updateCartUI();
        }

        function updateCartUI() {
            const cartItemsContainer = document.getElementById('cart-items');
            const counter = document.getElementById('cart-count');
            if(!cartItemsContainer) return;

            counter.innerText = cart.length;

            if (cart.length === 0) {
                cartItemsContainer.innerHTML = '<p class="empty-msg">Your cart is empty.</p>';
                return;
            }

            cartItemsContainer.innerHTML = '';
            cart.forEach((item, index) => {
                const itemElement = document.createElement('div');
                itemElement.classList.add('cart-item');
                itemElement.innerHTML = `
                    <div class="cart-item-info">
                        <h4>${item.title}</h4>
                        <span>R$ ${item.price}</span>
                    </div>
                    <button class="remove-btn" onclick="removeFromCart(${index})">❌ Remove</button>
                `;
                cartItemsContainer.appendChild(itemElement);
            });
        }

        // SAVE ORDER RECORDS TO LIVE CLOUD SERVER ON SUBMIT
        async function processDiscordOrder() {
            const buyerDiscord = document.getElementById('buyer-discord').value.trim();
            
            if (cart.length === 0) {
                alert("Your cart is empty!");
                return;
            }
            if (!buyerDiscord) {
                alert("Please enter your Discord Username!");
                return;
            }

            const orderID = "BOX-" + Math.floor(100000 + Math.random() * 900000);
            let totalRobux = 0;
            let itemsOrderedText = "";
            
            cart.forEach(item => {
                totalRobux += item.price;
                itemsOrderedText += `- ${item.title} (${item.price} Robux)\n`;
            });

            try {
                // Save the order details directly to your Supabase 'orders' table
                const { error } = await _supabase
                    .from('orders')
                    .insert([
                        { 
                            order_id: orderID, 
                            buyer_discord: buyerDiscord, 
                            items: itemsOrderedText, 
                            total_price: totalRobux 
                        }
                    ]);

                if (error) throw error;

                // Render receipt on completion page
                const mainContent = document.getElementById('cart-main-content');
                mainContent.innerHTML = `
                    <div class="receipt-container">
                        <div class="receipt-title">📋 ORDER RECORDED ONLINE</div>
                        <p style="font-size:13px; margin-bottom:10px; color:#b1b5be;"><strong>Order ID:</strong> ${orderID}</p>
                        <p style="font-size:13px; margin-bottom:10px; color:#b1b5be;"><strong>Buyer Discord:</strong> ${buyerDiscord}</p>
                        <p style="font-size:13px; margin-bottom:5px; color:#b1b5be;"><strong>Items:</strong></p>
                        <pre style="font-size:12px; background:#0f111a; padding:8px; border-radius:4px; margin-bottom:15px; color:#00a2ff; white-space: pre-wrap;">${itemsOrderedText}Total: R$ ${totalRobux}</pre>
                        
                        <h4 style="font-size:14px; color:#ffaa00; margin-bottom:8px;">👉 Next Steps to Get Your Items:</h4>
                        <ol class="receipt-steps">
                            <li>Go to Roblox and make sure you purchased the respective gamepass items matching the values above.</li>
                            <li>Take a clear, full screenshot of your Roblox <strong>Purchase History</strong> showing the payment went through successfully.</li>
                            <li>Add the admin on Discord: <span class="discord-tag-highlight">${myDiscordTag}</span></li>
                            <li>Send a DM containing your <strong>Order ID (${orderID})</strong> along with your <strong>screenshot proof</strong>!</li>
                        </ol>
                    </div>
                    <button class="checkout-btn" style="margin-top:15px; background:#02b757;" onclick="clearAndCloseOrder()">Got it! Close Order</button>
                `;

                cart.forEach(item => {
                    if(item.url && item.url !== "https://www.roblox.com/") {
                        window.open(item.url, '_blank');
                    }
                });

            } catch (err) {
                console.error("Order writing failure:", err);
                alert("Failed to submit order log details to the server data tables: " + err.message);
            }
        }

        function clearAndCloseOrder() {
            cart = [];
            updateCartUI();
            toggleCart();
        }

        // Kick off initialization sequence by loading live database
        loadProductsFromCloud();
    </script>
</body>
</html>
